<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .card { padding: 0; min-height: 0; }
  .sb {
    display: flex; align-items: center;
    height: 28px;
    padding: 0 12px;
    gap: 14px;
    background: var(--surface-1);
    border: 1px solid var(--border-1);
    border-radius: 4px;
    margin: 16px 16px 6px;
    font: 500 12px/1 var(--font-sans);
    color: var(--fg-2);
  }
  .sb .grp { display: flex; align-items: center; gap: 6px; }
  .sb .mono { font-family: var(--font-mono); color: var(--aux); font-variant-numeric: tabular-nums; font-size: 11px; }
  .sb .dot { width: 6px; height: 6px; border-radius: 50%; }
  .sb .dot.ok { background: var(--task); }
  .sb .dot.proto { background: var(--protocol); }
  .sb .sep { width: 1px; height: 12px; background: var(--border-1); }
  .sb .spacer { flex: 1; }
  .sb .hk { font: 500 11px/1 var(--font-mono); padding: 2px 5px; border: 1px solid var(--border-1); border-radius: 3px; background: var(--surface-2); color: var(--fg-2); }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--fg-3); padding: 16px 16px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="lbl">status bar · fixed bottom</div>
  <div class="sb">
    <span class="grp"><span class="dot ok"></span>connected</span>
    <span class="sep"></span>
    <span class="grp mono">claude-haiku-4.5</span>
    <span class="sep"></span>
    <span class="grp"><span class="dot proto"></span>plan</span>
    <span class="sep"></span>
    <span class="grp mono">3 scenes · 12m</span>
    <span class="spacer"></span>
    <span class="grp mono">12,481 tokens</span>
    <span class="sep"></span>
    <span class="grp"><span>help</span><span class="hk">?</span></span>
  </div>
</div>
</body></html>
