<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
    height: 110px;
    border: 1px dashed var(--border-1);
    border-radius: 4px;
    background: transparent;
  }
  .empty .msg { font: 400 13px/1.45 var(--font-sans); color: var(--fg-3); }
  .empty .hk { font: 500 11px/1 var(--font-mono); color: var(--fg-2); padding: 2px 5px; border:1px solid var(--border-1); border-radius:3px; background: var(--surface-2); }
  .empty .row { display: inline-flex; align-items: center; gap: 6px; color: var(--fg-3); font: 400 12px/1 var(--font-sans); grid-template-columns:none; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="empty">
      <div class="msg">No macros.</div>
      <div class="row"><span>create</span><span class="hk">⌘N</span></div>
    </div>
    <div class="empty">
      <div class="msg">No active scenes.</div>
      <div class="row"><span>spawn</span><span class="hk">⌘⇧N</span></div>
    </div>
  </div>
</div>
</body></html>
