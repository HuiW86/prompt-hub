<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 14px;
    align-items: center;
    justify-items: center;
  }
  .grid img { width: 16px; height: 16px; filter: invert(86%); opacity: 0.92; }
  .note { font: 400 12px/1.4 var(--font-sans); color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <img src="../assets/icons/command.svg">
    <img src="../assets/icons/option.svg">
    <img src="../assets/icons/search.svg">
    <img src="../assets/icons/terminal.svg">
    <img src="../assets/icons/play.svg">
    <img src="../assets/icons/pause.svg">
    <img src="../assets/icons/square.svg">
    <img src="../assets/icons/file.svg">
    <img src="../assets/icons/folder.svg">
    <img src="../assets/icons/file-code.svg">
    <img src="../assets/icons/layers.svg">
    <img src="../assets/icons/workflow.svg">
    <img src="../assets/icons/git-branch.svg">
    <img src="../assets/icons/clock.svg">
    <img src="../assets/icons/timer.svg">
    <img src="../assets/icons/activity.svg">
    <img src="../assets/icons/cpu.svg">
    <img src="../assets/icons/box.svg">
    <img src="../assets/icons/boxes.svg">
    <img src="../assets/icons/package.svg">
    <img src="../assets/icons/keyboard.svg">
    <img src="../assets/icons/sliders-horizontal.svg">
    <img src="../assets/icons/settings.svg">
    <img src="../assets/icons/eye.svg">
    <img src="../assets/icons/check.svg">
    <img src="../assets/icons/x.svg">
    <img src="../assets/icons/plus.svg">
    <img src="../assets/icons/circle-dashed.svg">
    <img src="../assets/icons/circle-dot.svg">
    <img src="../assets/icons/circle-check.svg">
    <img src="../assets/icons/circle-x.svg">
    <img src="../assets/icons/info.svg">
  </div>
  <div class="note">lucide-static · 16px · stroke 1.5 · color follows text</div>
</div>
</body></html>
