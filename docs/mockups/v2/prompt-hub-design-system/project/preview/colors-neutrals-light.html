<!doctype html>
<html lang="en" class="light">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#FAFAF9;">
  <div class="row" style="gap:18px;">
    <div class="swatch"><div class="chip" style="background:#FAFAF9;"></div><div class="name">canvas</div><div class="hex">#FAFAF9</div></div>
    <div class="swatch"><div class="chip" style="background:#F2F2F0;"></div><div class="name">surface-1</div><div class="hex">#F2F2F0</div></div>
    <div class="swatch"><div class="chip" style="background:#EAEAE7;"></div><div class="name">surface-2</div><div class="hex">#EAEAE7</div></div>
    <div class="swatch"><div class="chip" style="background:#DDDDD9;"></div><div class="name">surface-3</div><div class="hex">#DDDDD9</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#E2E2DE;"></div><div class="name">border-1</div><div class="hex">#E2E2DE</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#CFCFCA;"></div><div class="name">border-2</div><div class="hex">#CFCFCA</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#B6B6B0;"></div><div class="name">border-3</div><div class="hex">#B6B6B0</div></div>
  </div>
</div>
</body></html>
