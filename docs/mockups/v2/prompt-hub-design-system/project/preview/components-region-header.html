<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .region {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-1);
    background: var(--canvas);
  }
  .left { display: flex; align-items: baseline; gap: 10px; }
  .title { font: 600 14px/1 var(--font-sans); letter-spacing: -0.01em; color: var(--fg-1); }
  .count { font: 500 11px/1 var(--font-mono); color: var(--aux); font-variant-numeric: tabular-nums; }
  .right { display: flex; align-items: center; gap: 8px; color: var(--fg-3); }
  .hint  { font: 400 12px/1 var(--font-sans); color: var(--fg-3); }
  .hk { font: 500 11px/1 var(--font-mono); color: var(--fg-2); padding: 2px 5px; border:1px solid var(--border-1); border-radius:3px; background: var(--surface-2); }
</style>
</head>
<body>
<div class="card" style="padding:0; min-height:0;">
  <div class="region">
    <div class="left"><span class="title">Macros</span><span class="count">14</span></div>
    <div class="right"><span class="hint">new</span><span class="hk">⌘N</span></div>
  </div>
  <div class="region">
    <div class="left"><span class="title">Scenes</span><span class="count">3 · 12m</span></div>
    <div class="right"><span class="hint">filter</span><span class="hk">/</span></div>
  </div>
</div>
</body></html>
