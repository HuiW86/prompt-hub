<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row3 { display: flex; align-items: center; gap: 16px; }
  .spec { flex: 1; display: flex; align-items: center; gap: 10px; }
  .annot { font: var(--w-400) 11px/1 var(--font-mono); color: var(--fg-3); white-space: nowrap; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row3">
      <div class="spec"><span class="ph-meta">2,481 tokens · 14s ago · 3 runs</span></div>
      <div class="annot">12 · 400 · tabular · aux</div>
    </div>
    <div class="row3">
      <div class="spec">
        <span class="ph-hotkey">⌘</span>
        <span class="ph-hotkey">⌥Space</span>
        <span class="ph-hotkey">⏎</span>
        <span class="ph-hotkey">⇧⌘N</span>
      </div>
      <div class="annot">12 · 500 · mono</div>
    </div>
    <div class="row3">
      <div class="spec ph-empty" style="flex:1; padding: 6px 0;">No active scenes.</div>
      <div class="annot">13 · 400 · fg-3 · centered</div>
    </div>
  </div>
</div>
</body></html>
