<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border-1);
    border-radius: 4px;
    background: var(--surface-1);
  }
  .sk {
    background: linear-gradient(90deg, var(--skeleton) 0%, var(--skeleton-hi) 50%, var(--skeleton) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
    border-radius: 2px;
    height: 10px;
  }
  @keyframes shimmer { 0%{background-position: 200% 0;} 100%{background-position: -200% 0;} }
  .dot { width: 8px; height: 8px; flex: 0 0 auto; border-radius: 50%; background: var(--skeleton); animation: shimmer 1.4s linear infinite;
    background: linear-gradient(90deg, var(--skeleton) 0%, var(--skeleton-hi) 50%, var(--skeleton) 100%);
    background-size: 200% 100%;
  }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="row"><div class="dot"></div><div class="sk" style="flex:1;"></div></div>
    <div class="row"><div class="dot"></div><div class="sk" style="flex:1; max-width: 80%;"></div></div>
    <div class="row"><div class="dot"></div><div class="sk" style="flex:1; max-width: 60%;"></div></div>
    <div class="row"><div class="dot"></div><div class="sk" style="flex:1; max-width: 70%;"></div></div>
  </div>
  <div class="lbl">gray skeleton only · no semantic color · 1.4s linear shimmer</div>
</div>
</body></html>
