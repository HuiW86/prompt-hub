<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border-1);
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface-1);
  }
  .seg {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    font: 500 12px/1 var(--font-sans);
    color: var(--fg-2);
    border-right: 1px solid var(--border-1);
  }
  .seg:last-child { border-right: 0; }
  .seg.active { background: var(--protocol-8); color: var(--fg-1); }
  .seg.active .dot { background: var(--protocol); }
  .seg .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-4); }
  .seg .meta { color: var(--aux); font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 11px; }
  .lbl { font: 500 10px/1 var(--font-mono); color: var(--fg-3); margin-bottom: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="lbl">phase bar · protocol layer</div>
  <div class="bar">
    <div class="seg"><span class="dot"></span>scan<span class="meta">0:42</span></div>
    <div class="seg active"><span class="dot"></span>plan<span class="meta">1:08</span></div>
    <div class="seg"><span class="dot"></span>compose<span class="meta">—</span></div>
    <div class="seg"><span class="dot"></span>review<span class="meta">—</span></div>
    <div class="seg"><span class="dot"></span>land<span class="meta">—</span></div>
  </div>
</div>
</body></html>
