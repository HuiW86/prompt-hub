<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { font: 500 11px/1 var(--font-mono); color: var(--fg-3); width: 100px; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="row">
      <span class="lbl">single key</span>
      <span class="ph-hotkey">N</span>
      <span class="ph-hotkey">/</span>
      <span class="ph-hotkey">?</span>
      <span class="ph-hotkey">⏎</span>
      <span class="ph-hotkey">⎋</span>
    </div>
    <div class="row">
      <span class="lbl">modifier+key</span>
      <span class="ph-hotkey">⌘N</span>
      <span class="ph-hotkey">⌘K</span>
      <span class="ph-hotkey">⌥Space</span>
      <span class="ph-hotkey">⇧⌘P</span>
    </div>
    <div class="row">
      <span class="lbl">inline w/ label</span>
      <span style="font: 400 13px/1 var(--font-sans); color: var(--fg-2); display:inline-flex; align-items:center; gap:8px;">New scene <span class="ph-hotkey">⌘N</span></span>
    </div>
  </div>
</div>
</body></html>
