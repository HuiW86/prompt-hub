<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid8 { display: flex; align-items: flex-end; gap: 14px; padding-bottom: 4px; }
  .grid8 .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .grid8 .bar { background: var(--protocol); border-radius: 1px; opacity: 0.85; }
  .grid8 .lbl { font: 500 11px/1 var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="grid8">
    <div class="col"><div class="bar" style="width:24px;height:4px;"></div><div class="lbl">s-1 · 4</div></div>
    <div class="col"><div class="bar" style="width:24px;height:8px;"></div><div class="lbl">s-2 · 8</div></div>
    <div class="col"><div class="bar" style="width:24px;height:12px;"></div><div class="lbl">s-3 · 12</div></div>
    <div class="col"><div class="bar" style="width:24px;height:16px;"></div><div class="lbl">s-4 · 16</div></div>
    <div class="col"><div class="bar" style="width:24px;height:20px;"></div><div class="lbl">s-5 · 20</div></div>
    <div class="col"><div class="bar" style="width:24px;height:24px;"></div><div class="lbl">s-6 · 24</div></div>
    <div class="col"><div class="bar" style="width:24px;height:32px;"></div><div class="lbl">s-8 · 32</div></div>
  </div>
  <div style="font: 400 12px/1.4 var(--font-sans); color: var(--fg-3);">8px base grid. 4px allowed for tight cases. No spacing above 32px on the primary surface.</div>
</div>
</body></html>
