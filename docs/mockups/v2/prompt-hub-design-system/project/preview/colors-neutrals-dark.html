<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:18px;">
    <div class="swatch"><div class="chip" style="background:#0E0E10;"></div><div class="name">canvas</div><div class="hex">#0E0E10</div></div>
    <div class="swatch"><div class="chip" style="background:#141417;"></div><div class="name">surface-1</div><div class="hex">#141417</div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A1E;"></div><div class="name">surface-2</div><div class="hex">#1A1A1E</div></div>
    <div class="swatch"><div class="chip" style="background:#232328;"></div><div class="name">surface-3</div><div class="hex">#232328</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#232328;"></div><div class="name">border-1</div><div class="hex">#232328</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#2E2E34;"></div><div class="name">border-2</div><div class="hex">#2E2E34</div></div>
    <div class="swatch"><div class="chip" style="background:transparent; border-color:#3A3A42;"></div><div class="name">border-3</div><div class="hex">#3A3A42</div></div>
  </div>
</div>
</body></html>
