<!doctype html>
<html lang="en" class="dark">
<head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .list { display: flex; flex-direction: column; }
  .row {
    display: grid;
    grid-template-columns: 16px 1fr auto auto auto;
    align-items: center;
    gap: 12px;
    padding: 0 14px;
    height: 32px;
    border-bottom: 1px solid var(--border-1);
    cursor: pointer;
  }
  .row:last-child { border-bottom: 0; }
  .row:hover { border-bottom-color: var(--border-2); background: var(--surface-1); }
  .row.active { background: var(--task-8); }
  .row.focused { outline: 2px solid var(--task); outline-offset: -2px; }
  .row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--task); justify-self: center; }
  .row .dot.idle { background: var(--fg-4); }
  .row .title { font: 500 13px/1 var(--font-sans); color: var(--fg-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .path { font: 400 12px/1 var(--font-mono); color: var(--aux); }
  .row .meta { font: 400 12px/1 var(--font-mono); color: var(--aux); font-variant-numeric: tabular-nums; }
  .row .hk   { font: 500 11px/1 var(--font-mono); color: var(--fg-3); padding: 2px 5px; border:1px solid var(--border-1); border-radius:3px; background: var(--surface-2); }
</style>
</head>
<body>
<div class="card" style="padding:0; min-height:0;">
  <div class="list">
    <div class="row">
      <span class="dot"></span>
      <span class="title">composer-rewrite</span>
      <span class="path">~/repo/src/composer.tsx</span>
      <span class="meta">2m</span>
      <span class="hk">⏎</span>
    </div>
    <div class="row active">
      <span class="dot"></span>
      <span class="title">refactor-selection-modal</span>
      <span class="path">~/repo/src/modals/ref.tsx</span>
      <span class="meta">14s</span>
      <span class="hk">⏎</span>
    </div>
    <div class="row">
      <span class="dot idle"></span>
      <span class="title">flaky-test-bisect</span>
      <span class="path">~/repo/tests/scenes.test.ts</span>
      <span class="meta">8m</span>
      <span class="hk">⏎</span>
    </div>
    <div class="row">
      <span class="dot"></span>
      <span class="title">docs-pass</span>
      <span class="path">~/repo/docs/</span>
      <span class="meta">12m</span>
      <span class="hk">⏎</span>
    </div>
  </div>
</div>
</body></html>
