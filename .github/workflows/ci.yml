# Test + lint CI (frontend + Rust). Runs on every push to main and on all PRs.
#
# Style mirrors release.yml:
#   - macos-14 runner (project targets macOS only; depends on macos-private-api).
#   - Third-party actions pinned to commit SHA (not tags); shared actions reuse
#     the exact SHAs already pinned in release.yml.
#   - `permissions` minimized to contents:read (nothing here writes back).
#   - pnpm version resolves from package.json's `packageManager` field via
#     pnpm/action-setup (same as release.yml — no version hardcoded here).

name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: frontend — lint, format check, unit tests, production build. ─────
  frontend:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec prettier --check .
      - run: pnpm test
      - run: pnpm build

  # ── Job 2: rust — fmt, clippy (deny warnings), workspace tests. ─────────────
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      # dist/ is gitignored, so a fresh checkout has no frontendDist (../dist).
      # Debug builds (no `custom-protocol` feature) compile without it — verified
      # locally — but stub it anyway so tauri codegen never trips on a missing
      # asset path if feature flags or tauri-build behavior change.
      - name: Stub frontend dist for tauri codegen
        run: mkdir -p dist && touch dist/index.html

      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo clippy --workspace --all-targets --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --workspace --manifest-path src-tauri/Cargo.toml
