# Auto-update release pipeline (ADR-017).
#
# UNTESTABLE until Phase 0 keys exist — this is a reviewable first draft. It
# cannot run end-to-end until: (1) a minisign keypair is generated and the
# private key + password land in the `release-signing` Environment secrets,
# (2) the Apple notarization creds land as secrets, (3) tauri.conf.json's
# `plugins.updater.pubkey` placeholder is replaced with the real public key.
#
# Security model (ADR-017 §5.5):
#   - Trigger is tag-push ONLY. workflow_dispatch / repository_dispatch /
#     schedule are deliberately NOT listed, so they cannot trigger a release
#     (closes the gate-bypass surface).
#   - `permissions` is minimized to contents:write.
#   - Third-party actions are pinned to commit SHA (not tags).
#   - build and sign are SEPARATE jobs: the `build` job never sees the minisign
#     key, so a poisoned build-time dependency cannot exfiltrate it. The `sign`
#     job runs in a protected Environment (required reviewer) and signs only the
#     already-built, notarized artifacts.
#   - The release is created as a DRAFT; a human verifies hashes, then publishes.
#     A draft is NOT served as `releases/latest`, so the updater never sees an
#     unverified build.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Job 1: build + notarize. No minisign key in scope. ──────────────────────
  build:
    strategy:
      fail-fast: true
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version triple matches the tag
        run: bash scripts/check-version.sh "${GITHUB_REF_NAME#v}"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      # Build + notarize the .app AND the .dmg. createUpdaterArtifacts is
      # disabled here so the bundler does not try to minisign (no key in this
      # job) — the .app.tar.gz updater package is signed later in the sign job,
      # matching the ADR §6 order: notarize .app → package → tauri signer sign.
      #
      # The .dmg is a direct-install download only (NOT an updater artifact): it
      # never enters latest.json and is never minisigned, so producing it here
      # is safe. Tauri bundles `app` before `dmg` and the dmg reuses the
      # already-signed+notarized .app (tauri-bundler bundle ordering), so the
      # .app inside the dmg is the same notarized bundle; the dmg itself is
      # signed + notarized + stapled by the same Apple creds.
      - name: Build + notarize
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm tauri build \
            --target ${{ matrix.target }} \
            --bundles app,dmg \
            --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Pack notarized .app for handoff
        run: |
          dir="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          tar -C "$dir" -czf "app-${{ matrix.target }}.tgz" prompt-hub.app

      # Rename the dmg to the full-triple convention used by the updater
      # artifacts (prompt-hub_<version>_<target>.dmg) instead of Tauri's own
      # arch token (aarch64 / x64), so Release assets read consistently. Exactly
      # one dmg is produced per matrix target.
      - name: Stage dmg for handoff
        run: |
          version="${GITHUB_REF_NAME#v}"
          dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          src="$(ls "$dir"/*.dmg)"
          cp "$src" "prompt-hub_${version}_${{ matrix.target }}.dmg"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-${{ matrix.target }}
          path: |
            app-${{ matrix.target }}.tgz
            prompt-hub_*_${{ matrix.target }}.dmg
          retention-days: 1
          if-no-files-found: error

  # ── Job 2: sign + assemble latest.json + draft release. Gated. ──────────────
  sign:
    needs: build
    runs-on: macos-latest
    # Required-reviewer gate: configure a protected Environment named
    # `release-signing` (Settings → Environments) with a reviewer who is NOT the
    # tag author. The minisign key is an Environment secret, so it is only
    # injected after manual approval.
    environment: release-signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      # Package each notarized .app into its updater .app.tar.gz, then minisign
      # it. tauri signer reads the key from env. ::add-mask:: + no `set -x` keep
      # the key out of the (public) Actions log.
      - name: Sign + assemble latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "::add-mask::$TAURI_SIGNING_PRIVATE_KEY"
          echo "::add-mask::$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          version="${GITHUB_REF_NAME#v}"
          repo="${GITHUB_REPOSITORY}"
          base="https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}"
          mkdir -p dist
          platforms_json="{}"
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            case "$target" in
              aarch64-apple-darwin) platkey=darwin-aarch64 ;;
              x86_64-apple-darwin) platkey=darwin-x86_64 ;;
            esac
            # Direct-install dmg: already signed+notarized in the build job. It
            # is NOT minisigned and NOT added to latest.json — just staged into
            # dist for the draft-release asset list.
            cp "artifacts/app-${target}/prompt-hub_${version}_${target}.dmg" dist/
            tar -xzf "artifacts/app-${target}/app-${target}.tgz" -C artifacts
            archive="dist/prompt-hub_${version}_${target}.app.tar.gz"
            tar -C artifacts -czf "$archive" prompt-hub.app
            rm -rf artifacts/prompt-hub.app
            pnpm tauri signer sign "$archive"
            sig="$(cat "${archive}.sig")"
            url="${base}/$(basename "$archive")"
            platforms_json="$(jq -n \
              --argjson p "$platforms_json" \
              --arg k "$platkey" \
              --arg sig "$sig" --arg url "$url" \
              '$p + {($k): {signature: $sig, url: $url}}')"
          done
          jq -n \
            --arg version "$version" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$platforms_json" \
            '{version: $version, pub_date: $pub_date, platforms: $platforms}' \
            > dist/latest.json

      # Provenance: assert tag ↔ latest.json ↔ every artifact agree on version,
      # and that each latest.json URL points at a file present in dist. Fail the
      # release rather than rely on a human spotting a malformed manifest.
      - name: Assert provenance
        run: bash scripts/assert-provenance.sh "${GITHUB_REF_NAME#v}" dist

      # DRAFT release: a draft is never served as `releases/latest`, so the
      # updater cannot pick it up until a human verifies hashes and publishes.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Assets: updater package (.app.tar.gz) + its minisig + latest.json
          # manifest, plus the direct-install .dmg (not in latest.json — new
          # users install from the dmg, the updater consumes .app.tar.gz).
          gh release create "${GITHUB_REF_NAME}" \
            --draft \
            --title "${GITHUB_REF_NAME}" \
            --notes "Draft — verify artifact hashes, then publish to go live." \
            dist/*.dmg dist/*.app.tar.gz dist/*.app.tar.gz.sig dist/latest.json
